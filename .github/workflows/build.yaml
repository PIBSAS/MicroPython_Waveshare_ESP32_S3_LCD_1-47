name: MicroPython with JD9853 for Waveshare ESP32-S3 LCD 1.47 Touch

permissions:
  contents: write

on:
  push:
    tags:
     - 'v*'
  schedule:
     - cron: '0 0 1 * *'
  
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v6.0.2
      
    - name: Clonar Micropython
      run: git clone --recurse-submodules https://github.com/micropython/micropython.git
      
    - name: Instalar dependencias
      run: |
       sudo apt-get update
       sudo apt-get install -y build-essential git wget flex bison gperf pkg-config python3 python3-pip python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0 yq

    - id: idf_ver
      name: Extract IDF version from MicroPython workflow
      run: |
        cd micropython
        IDF_VER=$(yq '.env.IDF_NEWEST_VER' .github/workflows/ports_esp32.yml | tr -d '"')
        echo "IDF_VER=$IDF_VER" >> $GITHUB_OUTPUT

    - name: Show detected versions
      run: |
        echo "ESP-IDF version: ${{ steps.idf_ver.outputs.IDF_VER }}"

    - name: Clonar ESP-IDF
      run: |
        mkdir -p esp
        cd esp
        git clone --depth 1 --branch ${{ steps.idf_ver.outputs.IDF_VER }} --recursive https://github.com/espressif/esp-idf.git
        cd esp-idf/tools
        python3 idf_tools.py install cmake
        cd ..
        ./install.sh esp32s3
        cd
        
    - name: Compile with JD9853
     # continue-on-error: true
      run: |
        source esp/esp-idf/export.sh
        cd micropython/
        make -C mpy-cross
        export IDF_TARGET=esp32s3
        cd ports/esp32/
        idf.py set-target esp32s3
        cp ${GITHUB_WORKSPACE}/fonts/bitmap/vga1_16x16.py modules
        cp ${GITHUB_WORKSPACE}/fonts/truetype/NotoSans_32.py modules
        cp ${GITHUB_WORKSPACE}/fonts/vector/scripts.py modules
        cp ${GITHUB_WORKSPACE}/lib/axs5106.py modules
        cp ${GITHUB_WORKSPACE}/lib/tft_config.py modules
        
        idf.py -D MICROPY_BOARD=ESP32_GENERIC_S3 \
           -D USER_C_MODULES="$GITHUB_WORKSPACE/jd9853/micropython.cmake" \
           -B build-ESP32_GENERIC_S3 build

    - name: Move binaries JD853
     # if: success() || failure()
      run: |
        mkdir -p ./artifacts
        cp ${GITHUB_WORKSPACE}/micropython/ports/esp32/build-ESP32_GENERIC_S3/micropython.bin ./artifacts/
        cp ${GITHUB_WORKSPACE}/micropython/ports/esp32/build-ESP32_GENERIC_S3/bootloader/bootloader.bin ./artifacts/
        cp ${GITHUB_WORKSPACE}/micropython/ports/esp32/build-ESP32_GENERIC_S3/partition_table/partition-table.bin ./artifacts/
    
    - name: Get MicroPython Version from mpconfig.h
      run: |
        cd micropython/
        MAJOR=$(grep -oP '(?<=#define MICROPY_VERSION_MAJOR )[0-9]+' py/mpconfig.h)
        MINOR=$(grep -oP '(?<=#define MICROPY_VERSION_MINOR )[0-9]+' py/mpconfig.h)
        MICRO=$(grep -oP '(?<=#define MICROPY_VERSION_MICRO )[0-9]+' py/mpconfig.h)
        PRERELEASE=$(grep -oP '(?<=#define MICROPY_VERSION_PRERELEASE )[0-9]+' py/mpconfig.h)

        if [ "$PRERELEASE" -eq 1 ]; then
          MPY_VERSION="$MAJOR.$MINOR.$MICRO-preview"
        else
          MPY_VERSION="$MAJOR.$MINOR.$MICRO"
        fi

        echo "MPY_VERSION=$MPY_VERSION" >> $GITHUB_ENV
        
    - name: Generate Tag
      id: tag
      run: echo "TAG_NAME=release-$(date +'%Y%m%d-%H%M')" >> $GITHUB_ENV
      
    - name: GH Release
      uses: softprops/action-gh-release@v3.0.0
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: "MicroPython for Waveshare ESP32-S3 Touch LCD 1.47 with JD9853 Driver + AXS5106 Touch Module Release version ${{ env.MPY_VERSION }} (Build ${{ env.TAG_NAME }})"
        body: |
          Automated release for MicroPython.
          
          ## What we get here: 
          - MicroPython with JD9853 Driver in C + AXS5106 touch module in Python + tft_config for Waveshare ESP32-S3 Touch LCD 1.47:
            - ```micropython.bin, bootloader.bin and partition-table.bin.```

          # Instructions
            You need to have some dependencies pre-instaled in your OS:
            - Python 3
            - Pip
            - Python VENV
          
          ## Windows or Linux:
          Create Virtual Environment
          ```bash
          python -m venv esp-env
          ```
          
          ### On Windows activate Virtual Environment this way:
          ```bash
          .\esp-env\Scripts\activate
          ```
          ### On Linux activate Virtual Environment this way:
          ```bash
          source esp-env/bin/activate
          ```
          ### On Windows or Linux install esptool:
          ```bash
          pip install esptool
          ```
          
          ### Put Waveshare ESP32-S3 Touch LCD 1.47 in BOOTLOADER MODE:
          - With USB cable on USB COM Port, press BOOT button then RST button, release RST, then release BOOT button. Or unplug, press BOOT button meanwhile you plug in the usb cable to PC or SBC like a Raspberry Pi.
          - Alternative: Use Thonny IDE, plug your T-Display-S3, on Thonny Shell type:
          ```bash
          from machine import bootloader
          ```
          Press ``Enter`` then type:
          ```bash
          bootloader()
          ```
          Press ``Enter`` then just cose Thonny and go to Terminal with Virtual Environment activate.
          
          ### Erase Flash:
          ```bash
          python -m esptool --chip esp32s3 erase-flash
          ```
          ### Then Flash:
          - Put 3 binaries in the same folder you are executing the steps, example Downloads folder, you need to be in that folder where are the binaries.
          ```bash
          python -m esptool --chip esp32s3 -b 460800 --before default-reset --after no-reset write-flash --flash-mode dio --flash-size 16MB --flash-freq 80m 0x0 bootloader.bin 0x8000 partition-table.bin 0x10000 micropython.bin
          ```

          ### You can check from MicroPython Shell on Thonny with:
          ```bash
          help('modules')
          ```
          The modules in MicroPython.
          
          ### NOTE IN WINDOWS:
          - If you get a PowerShell Scripts Policy Execution Exception that don't let you activate the Virtual Environment:
          
           ````bash
          .\esp-env\Scripts\activate
          ````
          
          - Then open a Terminal like Administrator and type:
          
          ````bash
          Set-ExecutionPolicy Unrestricted
          ````
          - Close the Terminal now you can activate the Python Virtual Enmvironment

          - [ESPWebTool Flasher](https://esptool.spacehuhn.com/):
          
          ````bash
          - Put in Bootloader. Choose the USB/JTAG port.
          - ERASE button first.
          - Let it only:
            - 0x0 bootloader.bin
            - 0x8000 partition-table.bin
            - 0x10000 micropython.bin
            - Press PROGRAM after done, press RST button on Waveshare ESP32-S3 Touch LCD 1.47
          ````
        draft: false
        prerelease: false
        files: ./artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
